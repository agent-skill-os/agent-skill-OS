name: Publish Skills to NPM

on:
  push:
    branches:
      - publish-npm
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Build clean skills bundle (public files only)
        run: |
          rm -rf /tmp/clean-skills
          mkdir -p /tmp/clean-skills
          rsync -av --delete \
            --include='*/' \
            --include='SKILL.md' \
            --exclude='*' \
            skills/ /tmp/clean-skills/

      - name: Clone npm repository
        env:
          AGENTSKILL_PAT: ${{ secrets.AGENTSKILL_PAT }}
        run: |
          git clone https://x-access-token:${AGENTSKILL_PAT}@github.com/agent-skill-os/agent-skill-os-npm.git /tmp/agent-skill-os-npm

      - name: Sync skills and prepare npm package
        working-directory: /tmp/agent-skill-os-npm
        run: |
          mkdir -p skills
          rsync -av --delete /tmp/clean-skills/ skills/

          if [ ! -f package.json ]; then
            cat > package.json <<'JSON'
          {
            "name": "agent-skill-os-npm",
            "version": "0.0.0",
            "description": "Public AgentSkill OS skills registry package",
            "license": "MIT",
            "files": [
              "skills/**/*",
              "README.md"
            ]
          }
          JSON
          fi

          if [ ! -f README.md ]; then
            cat > README.md <<'EOF'
          # agent-skill-os-npm

          Public npm package distribution for AgentSkill OS skills.
          EOF
          fi

          npm version patch --no-git-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add skills package.json README.md
          if git diff --cached --quiet; then
            echo "No changes detected after sync/version bump; skipping push."
          else
            git commit -m "chore(release): sync skills and bump patch version"
            git push origin HEAD:main
          fi

      - name: Publish package to npm
        working-directory: /tmp/agent-skill-os-npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public
